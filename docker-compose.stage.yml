services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-myworld:stage}
    container_name: ${APP_CONTAINER_NAME:-myworld-stage-app}
    environment:
      APP_ENV: staging
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-myworld}:${POSTGRES_PASSWORD:-myworld}@postgres:5432/${POSTGRES_DB:-myworld}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      STORAGE_PATH: ${STORAGE_PATH:-/app/storage}
    ports:
      - "${APP_PORT:-8001}:8000"
    volumes:
      - ${STORAGE_DATA_DIR:-./data/stage/storage}:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: ${RESTART_POLICY:-unless-stopped}
