services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ${POSTGRES_CONTAINER_NAME:-myworld-postgres}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myworld}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myworld}
      POSTGRES_DB: ${POSTGRES_DB:-myworld}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myworld} -d ${POSTGRES_DB:-myworld}"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: ${RESTART_POLICY:-unless-stopped}

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-myworld-redis}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: ${RESTART_POLICY:-unless-stopped}
