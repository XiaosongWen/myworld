name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  backend-tests:
    name: Backend Tests & Migration Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: myworld
          POSTGRES_USER: myworld
          POSTGRES_PASSWORD: myworld_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Alembic Database Migrations
        env:
          DATABASE_URL: postgresql+asyncpg://myworld:myworld_password@localhost:5432/myworld
        run: |
          cd backend
          alembic upgrade head

      - name: Run Pytest Suite
        env:
          DATABASE_URL: postgresql+asyncpg://myworld:myworld_password@localhost:5432/myworld
          REDIS_URL: redis://localhost:6379
        run: |
          cd backend
          pytest

  frontend-tests:
    name: Frontend Vitest Suite & Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Vitest Unit Tests
        run: |
          cd frontend
          npm test

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build
