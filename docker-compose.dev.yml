services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: myworld-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myworld}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myworld}
      POSTGRES_DB: ${POSTGRES_DB:-myworld}
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-./data/dev/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myworld} -d ${POSTGRES_DB:-myworld}"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: myworld-redis
    ports:
      - "6379:6379"
    volumes:
      - ${REDIS_DATA_DIR:-./data/dev/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped
