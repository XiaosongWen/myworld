services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE}
    container_name: ${APP_CONTAINER_NAME}
    environment:
      APP_ENV: prod
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORAGE_PATH: ${STORAGE_PATH}
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - ${STORAGE_DATA_DIR}:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '${CPU_LIMIT}'
          memory: ${MEMORY_LIMIT}
    restart: ${RESTART_POLICY}
